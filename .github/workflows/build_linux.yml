name: Build Linux Application

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgl1-mesa-dev libegl1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build C++ Engine
      run: |
        cd engine
        cmake -B build -S . -DDUCHESS_BUILD_PYTHON=OFF -DDUCHESS_NATIVE_ARCH=OFF
        cmake --build build --config Release --target duchess_cli -- -j$(nproc)

    - name: Build Python Executable
      run: |
        pyinstaller \
          --name Duchess \
          --onedir \
          --windowed \
          --add-binary "engine/build/duchess_cli:." \
          --add-data "data/gm2001.bin:data" \
          --add-data "assets/duchess_icon.png:assets" \
          --hidden-import "sqlalchemy.ext.baked" \
          --icon "assets/duchess_icon.png" \
          duchess/main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Duchess-Linux
        path: dist/Duchess
