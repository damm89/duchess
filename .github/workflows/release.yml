name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller Pillow

    - name: Build C++ Engine
      run: |
        cd engine
        cmake -B build -S . -DDUCHESS_BUILD_PYTHON=OFF -DDUCHESS_NATIVE_ARCH=OFF
        cmake --build build --config Release --target duchess_cli

    - name: Package Application
      run: pyinstaller packaging/duchess_windows.spec

    - name: Create ZIP
      run: Compress-Archive -Path dist/Duchess -DestinationPath Duchess-Windows.zip

    - uses: actions/upload-artifact@v4
      with:
        name: Duchess-Windows
        path: Duchess-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgl1-mesa-dev libegl1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build C++ Engine
      run: |
        cd engine
        cmake -B build -S . -DDUCHESS_BUILD_PYTHON=OFF -DDUCHESS_NATIVE_ARCH=OFF
        cmake --build build --config Release --target duchess_cli -- -j$(nproc)

    - name: Package Application
      run: |
        pyinstaller \
          --name Duchess \
          --onedir \
          --windowed \
          --add-binary "engine/build/duchess_cli:." \
          --add-data "data/gm2001.bin:data" \
          --add-data "assets/duchess_icon.png:assets" \
          --hidden-import "sqlalchemy.ext.baked" \
          --icon "assets/duchess_icon.png" \
          duchess/main.py

    - name: Create tarball
      run: tar -czf Duchess-Linux.tar.gz -C dist Duchess

    - uses: actions/upload-artifact@v4
      with:
        name: Duchess-Linux
        path: Duchess-Linux.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller Pillow

    - name: Build C++ Engine
      run: |
        cd engine
        cmake -B build -S . -DDUCHESS_BUILD_PYTHON=OFF -DDUCHESS_NATIVE_ARCH=OFF
        cmake --build build --config Release --target duchess_cli -- -j$(sysctl -n hw.ncpu)

    - name: Package Application
      run: |
        pyinstaller \
          --name Duchess \
          --onedir \
          --windowed \
          --add-binary "engine/build/duchess_cli:." \
          --add-data "data/gm2001.bin:data" \
          --add-data "assets/duchess_icon.png:assets" \
          --hidden-import "sqlalchemy.ext.baked" \
          --icon "assets/duchess_icon.png" \
          duchess/main.py

    - name: Create ZIP
      run: cd dist && zip -r ../Duchess-macOS.zip Duchess

    - uses: actions/upload-artifact@v4
      with:
        name: Duchess-macOS
        path: Duchess-macOS.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          artifacts/Duchess-Windows/Duchess-Windows.zip
          artifacts/Duchess-Linux/Duchess-Linux.tar.gz
          artifacts/Duchess-macOS/Duchess-macOS.zip
